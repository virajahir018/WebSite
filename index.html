<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>WebSite</title>
</head>

<body>
    <nav>
        <img src="images/logo.png" alt="" height="100px">

        <ul>

            <li><i class="fa-solid fa-house"></i> Home</li>
            <li><i class="fa-solid fa-soap"></i> Product</li>
            <li><i class="fa-solid fa-location-dot"></i> Location</li>
            <li><i class="fa-solid fa-phone"></i> Contact</li>
        </ul>

        <div class="tsbtn">

            <div class="toggle" id="toggle"><i class="fa-solid fa-bars"></i></div>
            <button class="signbtn">Sign In</button>
        </div>
    </nav>



    <!-- Theme ======= -->

    <button class="themebtn">
        <div class="circle" id="circle">
        </div>
    </button>

    <!-- Slider ====== -->

    <div class="slider">
        <img src="images/slid1.jpg">
        <img src="images/slid2.jpg">
        <img src="images/slid3.jpg">

        <button class="prev sliderbtn" id="prev">&#10094;</button>
        <button class="next sliderbtn" id="next">&#10095;</button>
    </div>

    <!-- Clock ====== -->

    <div class="digital">
        <div class="clock" id="clock">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
